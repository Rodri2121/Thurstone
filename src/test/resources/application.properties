# Configuración SOLO para tests: base H2 en memoria, de modo que la suite
# no requiera un PostgreSQL en ejecución. Sobrescribe el datasource de
# producción (application.properties principal).
spring.datasource.url=jdbc:h2:mem:thurstone-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea y borra el esquema de entidades en cada ejecución de tests.
spring.jpa.hibernate.ddl-auto=create-drop

# Spring Session crea su esquema embebido en H2 automáticamente.
spring.session.jdbc.initialize-schema=embedded

# No ejecutar schema.sql (DDL específico de PostgreSQL) en los tests.
spring.sql.init.mode=never
