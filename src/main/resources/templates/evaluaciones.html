<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de evaluaciones | Test de Thurstone</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="pagina pagina--historial">
<main class="contenedor">

    <div class="barra-superior">
        <p class="barra-superior__usuario">Historial de tests asignados</p>
        <div class="barra-acciones">
            <a class="boton boton--secundario boton--pequeno" th:href="@{/panel}">Volver al panel</a>
        </div>
    </div>

    <header class="encabezado-resultados">
        <h1>Historial</h1>
        <p class="dato-tiempo"
           th:text="${#lists.size(evaluaciones)} + ' tests'">0 tests</p>
    </header>

    <p class="historial-vacio" th:if="${#lists.isEmpty(evaluaciones)}">
        Aún no asignaste tests.
    </p>

    <table class="historial" th:unless="${#lists.isEmpty(evaluaciones)}">
        <thead>
        <tr>
            <th>#</th>
            <th>Evaluado</th>
            <th>Estado</th>
            <th>Clave</th>
            <th>Asignado</th>
            <th>Completado</th>
            <th>Área primaria</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${evaluaciones}">
            <td th:text="${e.id}">1</td>
            <td th:text="${e.evaluadoNombre}">Evaluado</td>
            <td>
                <span class="estado"
                      th:classappend="'estado--' + ${#strings.toLowerCase(e.estado)}"
                      th:text="${e.estado}">ESTADO</span>
            </td>
            <td>
                <span class="clave-monospace"
                      th:text="${e.estado.name() == 'PENDIENTE' or e.estado.name() == 'EN_PROGRESO'} ? ${e.claveAcceso} : '—'">—</span>
            </td>
            <td th:text="${#temporals.format(e.fechaAsignacion, 'dd/MM/yyyy HH:mm')}">—</td>
            <td th:text="${e.fecha != null} ? ${#temporals.format(e.fecha, 'dd/MM/yyyy HH:mm')} : '—'">—</td>
            <td th:text="${e.areaPrimaria} ?: '—'">—</td>
            <td class="tabla-accion">
                <a th:if="${e.estado.name() == 'COMPLETADO'}"
                   th:href="@{'/evaluaciones/' + ${e.id}}">Ver</a>
            </td>
        </tr>
        </tbody>
    </table>

</main>
</body>
</html>
