<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Test de Thurstone</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="pagina pagina--auth">
<main class="contenedor contenedor--angosto">

    <header class="encabezado-resultados">
        <h1>Registro de psicólogo</h1>
    </header>

    <p class="alerta" th:if="${error}" th:text="${error}">Error</p>

    <form class="formulario" method="post" th:action="@{/registro}">
        <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" th:value="${nombre}" required autofocus>
        </div>
        <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" th:value="${apellido}">
        </div>
        <div class="campo">
            <label for="correo">Correo</label>
            <input type="email" id="correo" name="correo" th:value="${correo}" required>
        </div>
        <div class="campo">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena" required minlength="6">
        </div>
        <button class="boton boton--primario" type="submit">Crear cuenta</button>
    </form>

    <p class="auth-cambio">¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión</a></p>

    <div class="llamada">
        <a class="boton boton--secundario" th:href="@{/}">Volver al inicio</a>
    </div>

</main>
</body>
</html>
