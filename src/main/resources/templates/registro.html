<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Test de Thurstone</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="pagina pagina--auth">
<main class="contenedor contenedor--angosto">

    <header class="encabezado-resultados">
        <h1>Registro de psicólogo</h1>
    </header>

    <form class="formulario" method="post" th:action="@{/registro}" th:object="${registroDTO}">

        <!-- Errores globales: reglas de negocio del servicio (p. ej. correo ya registrado). -->
        <p class="alerta" th:if="${#fields.hasGlobalErrors()}"
           th:each="err : ${#fields.globalErrors()}" th:text="${err}">Error</p>

        <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" th:field="*{nombre}" required autofocus>
            <p class="campo__error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</p>
        </div>
        <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" th:field="*{apellido}">
            <p class="campo__error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}">Error</p>
        </div>
        <div class="campo">
            <label for="correo">Correo</label>
            <input type="email" id="correo" th:field="*{correo}" required>
            <p class="campo__error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">Error</p>
        </div>
        <div class="campo">
            <label for="contrasena">Contraseña</label>
            <!-- Sin th:field para no reflejar la contraseña en el HTML al re-renderizar. -->
            <input type="password" id="contrasena" name="contrasena" required minlength="6">
            <p class="campo__error" th:if="${#fields.hasErrors('contrasena')}" th:errors="*{contrasena}">Error</p>
        </div>
        <button class="boton boton--primario" type="submit">Crear cuenta</button>
    </form>

    <p class="auth-cambio">¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión</a></p>

    <div class="llamada">
        <a class="boton boton--secundario" th:href="@{/}">Volver al inicio</a>
    </div>

</main>
</body>
</html>
