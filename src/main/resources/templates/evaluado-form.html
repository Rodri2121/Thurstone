<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar evaluado | Test de Thurstone</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="pagina pagina--panel">
<main class="contenedor contenedor--angosto">

    <header class="encabezado-resultados">
        <h1>Registrar evaluado</h1>
    </header>

    <p class="alerta" th:if="${error}" th:text="${error}">Error</p>

    <form class="formulario" method="post" th:action="@{/evaluados}">
        <div class="campo">
            <label for="nombreCompleto">Nombre completo</label>
            <input type="text" id="nombreCompleto" name="nombreCompleto" required autofocus>
        </div>
        <div class="campo">
            <label for="correo">Correo (opcional)</label>
            <input type="email" id="correo" name="correo">
        </div>
        <div class="campo">
            <label for="edad">Edad (opcional)</label>
            <input type="number" id="edad" name="edad" min="1" max="120">
        </div>
        <div class="campo">
            <label for="genero">Género (opcional)</label>
            <select id="genero" name="genero">
                <option value="">—</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Otro">Otro</option>
            </select>
        </div>
        <button class="boton boton--primario" type="submit">Guardar</button>
    </form>

    <div class="llamada">
        <a class="boton boton--secundario" th:href="@{/panel}">Volver al panel</a>
    </div>

</main>
</body>
</html>
