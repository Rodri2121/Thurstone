<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar evaluado | Test de Thurstone</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body class="pagina pagina--panel">
<main class="contenedor contenedor--angosto">

    <header class="encabezado-resultados">
        <h1>Registrar evaluado</h1>
    </header>

    <form class="formulario" method="post" th:action="@{/evaluados}" th:object="${evaluadoDTO}">
        <div class="campo">
            <label for="nombreCompleto">Nombre completo</label>
            <input type="text" id="nombreCompleto" th:field="*{nombreCompleto}" required autofocus>
            <p class="campo__error" th:if="${#fields.hasErrors('nombreCompleto')}" th:errors="*{nombreCompleto}">Error</p>
        </div>
        <div class="campo">
            <label for="correo">Correo (opcional)</label>
            <input type="email" id="correo" th:field="*{correo}">
            <p class="campo__error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">Error</p>
        </div>
        <div class="campo">
            <label for="edad">Edad (opcional)</label>
            <input type="number" id="edad" th:field="*{edad}" min="1" max="120">
            <p class="campo__error" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}">Error</p>
        </div>
        <div class="campo">
            <label for="genero">Género (opcional)</label>
            <select id="genero" th:field="*{genero}">
                <option value="">—</option>
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Otro">Otro</option>
            </select>
        </div>
        <button class="boton boton--primario" type="submit">Guardar</button>
    </form>

    <div class="llamada">
        <a class="boton boton--secundario" th:href="@{/panel}">Volver al panel</a>
    </div>

</main>
</body>
</html>
