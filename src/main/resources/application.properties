spring.application.name=Thurstone
server.port=8081

# ===== PostgreSQL (inspirado en tienda-express) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/thurstone
spring.datasource.username=admin
spring.datasource.password=200419

# JPA / Hibernate: crea y actualiza automáticamente las tablas de entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Session JDBC: su esquema lo crea schema.sql de forma idempotente
# (spring.sql.init.mode=always), porque el DDL propio de Spring Session no usa
# IF NOT EXISTS y fallaría al reiniciar la aplicación.
spring.session.jdbc.initialize-schema=never
spring.sql.init.mode=always
